{% extends "base.html" %}
{% block title %}Register — ArthriCare{% endblock %}
{% block content %}
<style>
  body { background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%); min-height: 100vh; }
  .auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .auth-card { background: #fff; border-radius: 24px; padding: 44px 40px; width: 100%; max-width: 500px; box-shadow: 0 24px 64px rgba(0,0,0,.2); }
  .auth-logo { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: #0F766E; margin-bottom: 8px; }
  .auth-logo span { color: #F59E0B; }
  .auth-sub { color: #64748b; font-size: .9rem; margin-bottom: 28px; }
  .form-group { margin-bottom: 16px; }
  .input-icon-wrap { position: relative; }
  .input-icon-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94A3B8; }
  .input-icon-wrap .form-control, .input-icon-wrap .form-select { padding-left: 40px; }
  .role-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .role-btn { border: 2px solid #CCFBF1; border-radius: 12px; padding: 14px; text-align: center; cursor: pointer; transition: all .2s; }
  .role-btn input[type=radio] { display: none; }
  .role-btn.selected, .role-btn:has(input:checked) { border-color: #0D9488; background: #F0FDFA; }
  .role-btn i { font-size: 1.5rem; display: block; margin-bottom: 6px; color: #0D9488; }
  .role-btn span { font-size: .85rem; font-weight: 600; color: #134E4A; }
  .btn-register { width: 100%; background: #0D9488; color: #fff; border: none; border-radius: 12px; padding: 13px; font-weight: 700; font-size: 1rem; font-family: 'Syne', sans-serif; transition: background .2s; cursor: pointer; }
  .btn-register:hover { background: #0F766E; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: .88rem; color: #64748b; }
  .auth-footer a { color: #0D9488; font-weight: 600; text-decoration: none; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">Arthri<span>Care</span></div>
    <div class="auth-sub">Create your account</div>
    <form method="POST" action="{{ url_for('auth.register') }}">
      <p style="font-size:.85rem;font-weight:600;color:#134E4A;margin-bottom:10px;">I am a:</p>
      <div class="role-toggle">
        <label class="role-btn selected">
          <input type="radio" name="role" value="patient" checked>
          <i class="bi bi-person-heart"></i><span>Patient</span>
        </label>
        <label class="role-btn">
          <input type="radio" name="role" value="doctor">
          <i class="bi bi-hospital"></i><span>Doctor / Researcher</span>
        </label>
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <div class="input-icon-wrap">
          <i class="bi bi-person"></i>
          <input type="text" name="full_name" class="form-control" placeholder="Your full name" required>
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-icon-wrap">
          <i class="bi bi-envelope"></i>
          <input type="email" name="email" class="form-control" placeholder="you@email.com" required>
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label>Age</label>
          <div class="input-icon-wrap">
            <i class="bi bi-calendar"></i>
            <input type="number" name="age" class="form-control" placeholder="Age" min="1" max="120">
          </div>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <div class="input-icon-wrap">
            <i class="bi bi-gender-ambiguous"></i>
            <select name="gender" class="form-select">
              <option value="">Select</option>
              <option>Male</option><option>Female</option><option>Other</option>
            </select>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-icon-wrap">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control" placeholder="Min. 8 characters" required minlength="8">
        </div>
      </div>
      <button type="submit" class="btn-register">Create Account</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></div>
  </div>
</div>
{% endblock %}
